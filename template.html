<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(9,30,66,0.12);">

          <!-- HEADER -->
          <tr>
            <td style="background:linear-gradient(135deg,#0052cc 0%,#0079bf 60%,#00aecc 100%);padding:28px 32px;">
              <p style="margin:0;font-size:28px;line-height:1;">💳</p>
              <h1 style="margin:8px 0 0;color:#ffffff;font-size:20px;font-weight:700;letter-spacing:-0.3px;">
                CuentasRápidas — Nuevo Feedback
              </h1>
              <p style="margin:4px 0 0;color:rgba(255,255,255,0.7);font-size:13px;">
                Versión: <strong style="color:#ffffff;">{{version}}</strong>
                &nbsp;·&nbsp; Para: <strong style="color:#ffffff;">{{to_email}}</strong>
              </p>
            </td>
          </tr>

          <!-- RATINGS -->
          <tr>
            <td style="padding:28px 32px 0;">
              <h2 style="margin:0 0 18px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#5e6c84;">
                Puntuaciones
              </h2>
              <table width="100%" cellpadding="0" cellspacing="0">

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0f1f3;">
                    <span style="font-size:14px;color:#344563;font-weight:600;">Utilidad</span>
                  </td>
                  <td align="right" style="padding:12px 0;border-bottom:1px solid #f0f1f3;">
                    <span style="font-size:15px;font-weight:700;color:#0079bf;">{{utilidad}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0f1f3;">
                    <span style="font-size:14px;color:#344563;font-weight:600;">Usabilidad</span>
                  </td>
                  <td align="right" style="padding:12px 0;border-bottom:1px solid #f0f1f3;">
                    <span style="font-size:15px;font-weight:700;color:#0079bf;">{{usabilidad}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;">
                    <span style="font-size:14px;color:#344563;font-weight:600;">Funcionalidades</span>
                  </td>
                  <td align="right" style="padding:12px 0;">
                    <span style="font-size:15px;font-weight:700;color:#0079bf;">{{funcionalidades}}</span>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- MESSAGE -->
          <tr>
            <td style="padding:24px 32px;">
              <h2 style="margin:0 0 10px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#5e6c84;">
                Mensaje
              </h2>
              <p style="margin:0;font-size:15px;color:#172b4d;line-height:1.6;background:#f8f9fa;border-radius:8px;padding:14px 16px;border-left:3px solid #0079bf;">
                {{mensaje}}
              </p>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#f8f9fa;padding:16px 32px;border-top:1px solid #f0f1f3;">
              <p style="margin:0;font-size:12px;color:#97a0af;text-align:center;">
                Enviado desde CuentasRápidas · dev.miguelangel.jaimen
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
